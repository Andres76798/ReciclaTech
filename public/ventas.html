<!DOCTYPE html>
<html>
<head>
    <title>Ventas - ReciclaTech</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="header-content">
            <img src="images/logo.png" class="logo">
            <h1>Registro de Ventas</h1>
        </div>
    </header>

    <nav>
        <a href="index.html">Dashboard</a>
        <a href="inventario.html">Inventario</a>
        <a href="graficos.html">Estadísticas</a>
        <a href="#" class="logout" onclick="logout()">Cerrar sesión</a>
    </nav>

    <div class="contenedor">
        <div class="card">
            <h3>Nueva Venta</h3>
            <select id="material_select">
                <option value="">Cargando materiales...</option>
            </select>
            <input id="cantidad" type="number" placeholder="Cantidad (kg)" oninput="calcular()">
            <input id="precio" type="number" placeholder="Precio por kg" oninput="calcular()">
            <input id="cliente" placeholder="Cliente">
            <h3>Total Venta: <span id="totalVenta">$0</span></h3>
            <button onclick="guardarVenta()">Registrar Venta</button>
        </div>
    </div>

    <script>
        async function cargarMateriales() {
            const res = await fetch("/inventario");
            const materiales = await res.json();
            const select = document.getElementById("material_select");
            select.innerHTML = '<option value="">Seleccione material del stock</option>';
            materiales.forEach(m => {
                select.innerHTML += `<option value="${m.id}" data-nombre="${m.nombre}">${m.nombre} (${m.peso}kg disp.)</option>`;
            });
        }

        function calcular() {
            const c = document.getElementById("cantidad").value || 0;
            const p = document.getElementById("precio").value || 0;
            document.getElementById("totalVenta").innerText = "$" + (c * p);
        }

        async function guardarVenta() {
            const select = document.getElementById("material_select");
            const data = {
                material_id: select.value,
                material_nombre: select.options[select.selectedIndex].getAttribute("data-nombre"),
                cantidad: document.getElementById("cantidad").value,
                precio: document.getElementById("precio").value,
                cliente: document.getElementById("cliente").value
            };

            await fetch("/venta", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            });
            alert("Venta registrada");
            location.reload();
        }

        function logout() { localStorage.removeItem("login"); window.location.href="login.html"; }
        window.onload = cargarMateriales;
    </script>
</body>
</html>
